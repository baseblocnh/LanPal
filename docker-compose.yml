services:
  lanpal:
    image: ghcr.io/baseblocnh/lanpal:latest
    container_name: lanpal
    # host networking is required for Wake-on-LAN direct mode to reach your LAN.
    # The app binds to port 8080 directly on the host.
    network_mode: host
    volumes:
      - lanpal-data:/data
    environment:
      - DB_PATH=/data/lanpal.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/servers"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  lanpal-data:
